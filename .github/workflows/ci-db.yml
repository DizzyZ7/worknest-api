name: CI-DB

on:
  push:
  pull_request:

jobs:
  test-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          pip install -r requirements_full.txt
      - run: pytest tests_db
